services:
  adsentral-fe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adsentral-fe-dev
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NITRO_PORT: ${NITRO_PORT:-3000}
      NITRO_HOST: ${NITRO_HOST:-0.0.0.0}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/backend}
      NUXT_PUBLIC_BACKEND_URL: ${NUXT_PUBLIC_BACKEND_URL:-http://103.179.57.147:8080}

    networks:
      - proxy

networks:
  proxy:
    external: true